# Redirect HTTP → HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name beezvn.com www.beezvn.com;
    location / {
        return 301 https://$host$request_uri;
    }
}
# HTTPS
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name beezvn.com www.beezvn.com;
    ssl_certificate     /etc/letsencrypt/live/beezvn.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/beezvn.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    root /usr/share/nginx/html;
    index index.html;

    # Allow larger upload payloads (must be >= multer fileSize limit)
    client_max_body_size 20m;

    # Proxy API
    location /api {
        proxy_pass         http://backend:5002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 20m;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}