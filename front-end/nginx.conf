# Cache video CHỈ khi đã sẵn sàng (200/206/304). Khi chưa transcode xong backend
# trả 404 → "no-store" để Cloudflare KHÔNG cache lại cái 404 (nếu cache, video sẽ
# "chết" tới vài giờ dù file đã xong). Frontend poll URL tới khi nhận 200.
map $upstream_status $videos_cc {
    default "no-store";
    "200"   "public, max-age=2592000, immutable";
    "206"   "public, max-age=2592000, immutable";
    "304"   "public, max-age=2592000, immutable";
}

# Redirect HTTP → HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name beezvn.com www.beezvn.com;
    location / {
        return 301 https://$host$request_uri;
    }
}
# HTTPS
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name beezvn.com www.beezvn.com;
    ssl_certificate     /etc/letsencrypt/live/beezvn.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/beezvn.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    root /usr/share/nginx/html;
    index index.html;

    # Default body limit for normal API calls (images, JSON, etc.)
    client_max_body_size 20m;

    # ── Video upload: large body, no buffering, long timeouts ────────────────
    # MUST appear before the generic /api block so it wins the longest-prefix match.
    location = /api/upload/video {
        proxy_pass         http://backend:5002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        client_max_body_size      550m;   # > multer 500MB limit
        client_body_buffer_size   1m;
        proxy_request_buffering   off;    # stream directly to backend
        proxy_buffering           off;
        proxy_read_timeout        1800s;  # 30 min for slow uploads
        proxy_send_timeout        1800s;
    }

    # ── Chunked upload: mỗi mảnh ≤60MB (< 100MB Cloudflare), file lớn tới 500MB ──
    location = /api/upload/video/chunk {
        proxy_pass         http://backend:5002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        client_max_body_size      70m;    # > 60MB chunk + overhead
        proxy_request_buffering   off;
        proxy_read_timeout        900s;
        proxy_send_timeout        900s;
    }

    # ── Chunked image upload: mỗi mảnh ≤50MB, tổng tới 500MB ───────────────
    location = /api/upload/image/chunk {
        proxy_pass         http://backend:5002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        client_max_body_size      70m;    # > 50MB chunk + overhead
        proxy_request_buffering   off;
        proxy_read_timeout        900s;
        proxy_send_timeout        900s;
    }

    # ── Video serving: enable Range, aggressive cache, no proxy buffering ────
    location ^~ /api/videos/ {
        proxy_pass         http://backend:5002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Range             $http_range;
        proxy_set_header   If-Range          $http_if_range;

        proxy_buffering    off;            # stream video bytes through
        proxy_cache_bypass $http_range;
        proxy_no_cache     $http_range;
        proxy_read_timeout 600s;

        # Cache-Control phụ thuộc status: 200/206 → cache lâu; 404 (chưa xử lý xong)
        # → no-store để Cloudflare không cache cái 404. `always` để áp cả response lỗi.
        proxy_hide_header  Cache-Control;
        add_header Accept-Ranges bytes always;
        add_header Cache-Control $videos_cc always;
    }

    # Proxy API (generic)
    # ^~ prevents the static-asset regex below from hijacking /api/public/uploads/*.jpg etc.
    location ^~ /api {
        proxy_pass         http://backend:5002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 20m;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}