services:
  mongo:
    image: mongo:7
    container_name: beez_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-secret}
      MONGO_INITDB_DATABASE: beez
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:1
    container_name: beez_mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASS:-secret}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-secret}@mongo:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      mongo:
        condition: service_healthy

  backend:
    build:
      context: ./back-end
    container_name: beez_backend
    restart: unless-stopped
    environment:
      PORT: 4000
      NODE_ENV: production
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-secret}@mongo:27017/beez?authSource=admin
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    volumes:
      # Media files mount — thêm video/ảnh vào back-end/public/ không cần rebuild
      - ./back-end/public:/app/public
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./front-end
      args:
        # VITE_API_URL="" → dùng relative path, Nginx proxy sang backend
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: beez_frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  mongo_data:
