version: '3.9'

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: beez-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
      MONGO_INITDB_DATABASE: beez_db
    volumes:
      - mongodb_data:/data/db
    networks:
      - beez-net
    healthcheck:
      test:
        - CMD-SHELL
        - mongosh --quiet -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval "db.adminCommand('ping').ok"
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Backend ───────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    container_name: beez-backend
    restart: unless-stopped
    env_file:
      - ./back-end/.env
    environment:
      MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASS}@mongodb:27017/beez_db?authSource=admin
      NODE_ENV: production
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - beez-net

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    container_name: beez-frontend
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - beez-net

# ── Shared network ─────────────────────────────────────────────────────────────
networks:
  beez-net:
    driver: bridge

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  mongodb_data:
